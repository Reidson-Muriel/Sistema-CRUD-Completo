<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar contatos</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="fundo-app">
    <header class="top">
        <button onclick="history.back()" class="btn btn-secondary btn-sm me-3 mt-1">Voltar</button>
        <h1>Cadastrar-los</h1>
    </header>
    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="form_contato" class="border border-info p-4 rounded bg-secondary mx-auto">
                    <div class="mb-3">
                    <label for="form-label">Nome:</label>
                    <input type="text" id="nome" class="form-control" placeholder="Digite o seu nome" required>
                    </div>
                    <div class="mb-3">
                    <label for="form-label">Nascimento:</label>
                    <input type="date" id="nascimento" class="form-control" required>
                    </div>
                    <div class="mb-3">
                    <label for="form-label">Telefone:</label>
                    <input type="text" id="telefone" class="form-control" placeholder="Digite o seu telefone" required>
                    </div>
                    <div class="mb-3">
                    <label for="form-label">E-mail:</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite o seu email" required>
                    </div>
                    <div class="mb-3">
                    <label for="form-label">Endereço:</label>
                    <input type="text" id="endereco" class="form-control" placeholder="Digite o seu enderenco" required>
                    </div>
                    <div class="mb-3">
                    <label for="form-label">Observação:</label>
                    <input type="text" id="observacao" class="form-control" placeholder="Digite a sua observacao" required>
                    </div>
                    <button type="submit" id="submit" class="btn btn-primary w-100">Adicionar contato</button>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
    integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
    integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
    crossorigin="anonymous"></script>
<script src="cadastro.js"></script>

</html>
